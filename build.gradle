plugins {
    id 'java'
}

group = 'com.zuuma10'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'com.codeborne:selenide:7.16.2'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.2'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}